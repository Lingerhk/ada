title: Obfuscated payload transfered via service name - Tchopper (command) Count
id: flow-0017
status: experimental
rule_origin: public
enable: true
description: Detects scenarios where an attacker uses the Tchopper tool by abusing the display name of a service as a placeholder
  to upload an obfuscated payload. With this command, attacker appends the current service name to a file.
references:
- https://github.com/mdecrevoisier/EVTX-to-MITRE-Attack/tree/master/TA0005-Defense%20Evasion/T1027-Obfuscated%20Files%20or%20Information
- https://github.com/lawrenceamer/TChopper
- https://github.com/mdecrevoisier/SIGMA-detection-rules
author: mdecrevoisier
date: 2026/05/04
modified: 2026/05/04
tags:
- TA0005
- attack.t1027
- attack.defense_evasion
logsource: flow
detection:
  event_type: count
  win_size: 20m
  sorted: false
  sigma_rules:
  - winlog-0233
  match_by: $s1.EventRecordID._count > 50
level: high
unique_filter:
- $s1.Hostname
- ttl_1800

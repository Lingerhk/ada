title: Massive services termination burst Count
id: flow-0029
status: experimental
rule_origin: public
enable: true
description: Detects scenarios where an attacker attempts to stop multiples services on a host. Attacker may target services
  related to databases, security products or backups (Veeam, Symantec, Acronis ...).
references:
- https://www.microsoft.com/security/blog/2020/03/05/human-operated-ransomware-attacks-a-preventable-disaster/
- https://fourcore.io/blogs/ryuk-ransomware-simulation-mitre-ttp
- https://thedfirreport.com/2021/12/13/diavol-ransomware/
- https://www.sentinelone.com/labs/black-basta-ransomware-attacks-deploy-custom-edr-evasion-tools-tied-to-fin7-threat-actor/
- https://www.trendmicro.com/en_us/research/22/h/ransomware-actor-abuses-genshin-impact-anti-cheat-driver-to-kill-antivirus.html
- https://github.com/mdecrevoisier/SIGMA-detection-rules
author: mdecrevoisier
date: 2026/05/04
modified: 2026/05/04
tags:
- TA0040
- attack.t1489
- attack.impact
- attack.defense_evasion
- attack.1562.001
logsource: flow
detection:
  event_type: count
  win_size: 1m
  sorted: false
  sigma_rules:
  - winlog-0307
  match_by: $s1.EventRecordID._count > 2
level: high
unique_filter:
- $s1.Hostname
- ttl_1800

title: Massive services deletion burst Count
id: flow-0024
status: experimental
rule_origin: public
enable: true
description: Detects scenarios where an attacker attempts to delete multiples services on a host. Attacker may target services
  related to databases, security products or backups (Veeam, Symantec, Acronis ...).
references:
- https://unit42.paloaltonetworks.com/mallox-ransomware/
- https://github.com/mdecrevoisier/SIGMA-detection-rules
author: mdecrevoisier
date: 2026/05/04
modified: 2026/05/04
tags:
- TA0040
- attack.t1489
- attack.impact
- attack.defense_evasion
- attack.1562.001
logsource: flow
detection:
  event_type: count
  win_size: 1m
  sorted: false
  sigma_rules:
  - winlog-0297
  match_by: $s1.EventRecordID._count > 2
level: high
unique_filter:
- $s1.Hostname
- ttl_1800

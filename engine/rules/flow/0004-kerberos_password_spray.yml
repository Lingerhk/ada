title: Kerberos Password Spray Pattern
id: flow-0004
status: experimental
rule_origin: internal
enable: true
description: Correlates a failed Kerberos TGT request with a Kerberos pre-authentication failure from the same host and source
  IP within three seconds. The sequence is a high-confidence indicator of Kerberos password spraying or password guessing.
references:
- https://learn.microsoft.com/en-us/windows/security/threat-protection/auditing/event-4768
- https://learn.microsoft.com/en-us/windows/security/threat-protection/auditing/event-4771
- https://attack.mitre.org/techniques/T1110/003/
author: ADA default rules
date: 2021/12/12
modified: 2026/05/05
tags:
- TA0006
- attack.t1110.003
- attack.credential_access
logsource: flow
detection:
  event_type: multi_eve
  win_size: 3s
  sigma_rules:
  - winlog-0004
  - winlog-0005
  match_by: $s1.IpAddress == $s2.IpAddress AND $s1.Hostname == $s2.Hostname
level: high
x_legacy_id: flow-0004
x_legacy_file: engine/rules/flow/0004-kerberos_password_spray.yml

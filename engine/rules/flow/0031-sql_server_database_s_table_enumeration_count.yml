title: SQL Server database's table enumeration Count
id: flow-0031
status: experimental
rule_origin: public
enable: true
description: Detects scenarios where an attacker attempts to enumerate local SQL Server tables (specially Veeam Backup).
references:
- https://labs.withsecure.com/publications/fin7-target-veeam-servers
- https://blog.checkymander.com/red%20team/veeam/decrypt-veeam-passwords/
- https://github.com/mdecrevoisier/SIGMA-detection-rules
author: mdecrevoisier
date: 2026/05/04
modified: 2026/05/04
tags:
- TA0007
- attack.t1518
- attack.discovery
logsource: flow
detection:
  event_type: count
  win_size: 5m
  sorted: false
  sigma_rules:
  - winlog-0323
  match_by: $s1._count > 20
level: medium
unique_filter:
- $s1.Hostname
- ttl_1800

title: RDP reconnaissance with valid credentials performed on multiple hosts
id: winlog-0272
status: experimental
rule_origin: public
description: Detects scenarios where an attacker attempts to brutforce RDP services with compromised credentials via tools
  like Hydra. Note that this event will be reported only with valid user and password credentials, and it may be reported
  only when RDP session is fully opened (so not during reconnaisance phase) if NLA is disabled. For further correlation, ID
  4624/4625 (logon type 3, 7 or 10) should be used.
references:
- https://github.com/mdecrevoisier/EVTX-to-MITRE-Attack/tree/master/TA0001-Initial%20access/T1078-Valid%20accounts

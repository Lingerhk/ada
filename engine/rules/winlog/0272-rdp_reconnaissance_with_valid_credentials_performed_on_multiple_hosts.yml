author: mdecrevoisier
date: 2026/05/04
modified: 2026/05/04
tags:
- TA0001
- attack.t1078
- attack.t1021.001
- attack.initial_access
- attack.lateral_movement
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 1149
    Channel: Microsoft-Windows-TerminalServices-RemoteConnectionManager/Operational
  filter:
    IpAddress:
    - '%vulnerability_scanners%'
    - '%admin_jump_hosts%'
    - 127.0.0.1
    - ::1
  condition: selection and not filter
fields:
- Hostname
- Channel
- EventID
- IpAddress
unique_fields:
- IpAddress
falsepositives:
- VAS scanners, administrator jump host
level: high

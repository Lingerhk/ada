title: Privilege escalation via runas command source
id: winlog-0334
status: experimental
rule_origin: public
description: Source command event for the runas privilege-escalation multi-event flow rule.
references:
- https://github.com/mdecrevoisier/SIGMA-detection-rules
author: mdecrevoisier
date: 2026/05/04
modified: 2026/05/05
tags:
- TA0004
- attack.t1134
- attack.privilege_escalation
logsource:
  product: windows
  category: process_creation
detection:
  selection_command:
    EventID: 4688
    NewProcessName|endswith: \runas.exe
    CommandLine|contains|all:
    - runas
    - '/user:'
  condition: selection_command
fields:
- Hostname
- EventID
- NewProcessName
- CommandLine
unique_fields:
- Hostname
falsepositives:
- Administrator activity
level: medium

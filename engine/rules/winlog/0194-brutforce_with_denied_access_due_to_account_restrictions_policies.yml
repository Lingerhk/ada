- https://github.com/mdecrevoisier/SIGMA-detection-rules
author: mdecrevoisier
date: 2026/05/04
modified: 2026/05/04
tags:
- TA0004
- attack.t1078
- attack.privilege_escalation
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4625
    Status:
    - '0xc0000022'
    - '0xC0000413'
    - '0xC000006E'
    - '0xC000006F'
    - '0xC0000070'
    - '0xC000015B'
  condition: selection
fields:
- Hostname
- EventID
- Status
- EventRecordID
unique_fields:
- Hostname
falsepositives:

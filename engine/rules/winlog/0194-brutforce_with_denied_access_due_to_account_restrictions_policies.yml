title: Brutforce with denied access due to account restrictions policies
id: winlog-0194
status: experimental
rule_origin: public
description: Detects scenarios where an attacker attemps to use a comprimised account but failed to login due to account restrictions
  policies (permissions, time restrictions, workstation, logon type, ...)

name: "adaegis-poc"

services:
  # Redis and MongoDB are provided by the portal side (192.168.9.2).
  # Portal apiserver runs on the cloud docker platform.

  ada_elasticsearch:
    container_name: "ada_elasticsearch"
    image: ada_elasticsearch:2.9.1
    restart: unless-stopped
    networks:
      ada-networks:
        aliases:
          - elasticsearch
          - ada_elasticsearch
    environment:
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - ELASTIC_PASSWORD=nf6ZIN3AIfFs5ufZf9E
      - xpack.security.enabled=true
    mem_limit: 3g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data:rw
    ports:
      - "9200:9200"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -u elastic:nf6ZIN3AIfFs5ufZf9E http://localhost:9200/_cluster/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  ada_elasticsearch_setup:
    container_name: "ada_elasticsearch_setup"
    image: ada_elasticsearch_setup:2.9.1
    networks:
      ada-networks:
    environment:
      - ELASTIC_PASSWORD=nf6ZIN3AIfFs5ufZf9E
      - KIBANA_PASSWORD=HszHApENsYWZXgq9mxOC
    depends_on:
      ada_elasticsearch:
        condition: service_healthy
    restart: "no"

  ada_kibana:
    container_name: "ada_kibana"
    image: ada_kibana:2.9.1
    restart: unless-stopped
    networks:
      ada-networks:
        aliases:
          - kibana
          - ada_kibana
    ports:
      - "5601:5601"
    depends_on:
      ada_elasticsearch:
        condition: service_healthy
      ada_elasticsearch_setup:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -u elastic:nf6ZIN3AIfFs5ufZf9E http://localhost:5601/api/status || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  ada_kibana_setup:
    container_name: "ada_kibana_setup"
    image: ada_elasticsearch_setup:2.9.1
    networks:
      ada-networks:
    environment:
      - ELASTIC_PASSWORD=nf6ZIN3AIfFs5ufZf9E
      - KIBANA_PASSWORD=HszHApENsYWZXgq9mxOC
      - CREATE_DATA_VIEWS=true
      - SKIP_PASSWORD_SETUP=true
    depends_on:
      ada_kibana:
        condition: service_healthy
    restart: "no"

  ada_backend:
    container_name: "ada_backend"
    image: ada_backend:2.9.1
    restart: unless-stopped
    networks:
      ada-networks:
        aliases:
          - backend
          - ada_backend
    ports:
      - "80:80"
      - "9092:9092/udp"
    volumes:
      - backend_data:/home/adadmin/logs:rw
      - report_data:/home/adadmin/download/report:rw
      - rules_data:/home/adadmin/rules:rw
      - ./ada-service/apiserver.backend.yaml:/home/adadmin/conf/apiserver.yaml:ro
      - ./ada-service/tasker.yaml:/home/adadmin/conf/tasker.yaml:ro
    environment:
      - GIN_MODE=release
      - TEST_TRAIT=c6dd002b714181fd7c273ee7fdda5d16
    depends_on:
      ada_elasticsearch:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:8801/ping || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  ada_engine:
    container_name: "ada_engine"
    image: ada_engine:2.9.1
    restart: unless-stopped
    networks:
      ada-networks:
        aliases:
          - engine
          - ada_engine
    volumes:
      - engine_data:/home/adadmin/logs:rw
      - rules_data:/home/adadmin/rules:ro
      - ./ada-service/engine.yaml:/home/adadmin/conf/engine.yaml:ro
    depends_on:
      - ada_elasticsearch

  ada_zeek:
    container_name: "ada_zeek"
    image: ada_zeek:2.9.1
    restart: unless-stopped
    networks:
      ada-networks:
        aliases:
          - zeek
          - ada_zeek
    ports:
      - "9093:9093/udp"
    depends_on:
      - ada_elasticsearch
      - ada_backend

  ada_scanner:
    container_name: "ada_scanner"
    image: ada_scanner:2.9.1
    restart: unless-stopped
    networks:
      ada-networks:
        aliases:
          - scanner
          - ada_scanner
    volumes:
      - scanner_data:/home/adadmin/logs:rw
      - ./ada-service/scanner.yaml:/home/adadmin/conf/scanner.yaml:ro
    depends_on:
      - ada_backend

# define docker network
networks:
  ada-networks:
    driver: bridge

volumes:
  es_data:
    driver: local
  backend_data:
    driver: local
  report_data:
    driver: local
  engine_data:
    driver: local
  scanner_data:
    driver: local
  rules_data:
    driver: local

name: "adaegis"

services:
  ada_mongodb:
    container_name: "ada_mongodb"
    image: ada_mongodb:2.9.1
    restart: unless-stopped
    networks:
      ada-networks:
        aliases:
          - mongodb
          - ada_mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME="root"
      - MONGO_INITDB_ROOT_PASSWORD="XEl44B4p3hFurztFMo38"
    volumes:
      - mongodb_data:/data/db:rw
    ports:
      - "27017:27017/tcp"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet -u root -p XEl44B4p3hFurztFMo38 --eval 'db.runCommand({ ping: 1 }).ok' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  ada_redis:
    container_name: "ada_redis"
    image: ada_redis:2.9.1
    restart: unless-stopped
    networks:
      ada-networks:
        aliases:
          - redis
          - ada_redis
    volumes:
      - redis_data:/data:rw
    ports:
      - "9091:9091/tcp"
      - "6379:6379/tcp"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -p 6379 -a 1pa2YgE3jfTbVVpn06CN ping | grep PONG || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  ada_elasticsearch:
    container_name: "ada_elasticsearch"
    image: ada_elasticsearch:2.9.1
    restart: unless-stopped
    networks:
      ada-networks:
        aliases:
          - elasticsearch
          - ada_elasticsearch
    environment:
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
      - ELASTIC_PASSWORD=nX0ZIN0AIfFs5x=fZfuE
      - xpack.security.enabled=true
    mem_limit: 4g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data:rw
    ports:
      - "9200:9200"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -u elastic:nX0ZIN0AIfFs5x=fZfuE http://localhost:9200/_cluster/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  ada_elasticsearch_setup:
    container_name: "ada_elasticsearch_setup"
    image: ada_elasticsearch_setup:2.9.1
    networks:
      ada-networks:
    environment:
      - ELASTIC_PASSWORD=nX0ZIN0AIfFs5x=fZfuE
      - KIBANA_PASSWORD=HszHApENsYWZXgq9mxOC
    depends_on:
      ada_elasticsearch:
        condition: service_healthy
    restart: "no"

  ada_kibana:
    container_name: "ada_kibana"
    image: ada_kibana:2.9.1
    restart: unless-stopped
    networks:
      ada-networks:
        aliases:
          - kibana
          - ada_kibana
    ports:
      - "5601:5601"
    depends_on:
      ada_elasticsearch:
        condition: service_healthy
      ada_elasticsearch_setup:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -u elastic:nX0ZIN0AIfFs5x=fZfuE http://localhost:5601/api/status || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  ada_kibana_setup:
    container_name: "ada_kibana_setup"
    image: ada_elasticsearch_setup:2.9.1
    networks:
      ada-networks:
    environment:
      - ELASTIC_PASSWORD=nX0ZIN0AIfFs5x=fZfuE
      - KIBANA_PASSWORD=HszHApENsYWZXgq9mxOC
      - CREATE_DATA_VIEWS=true  # This service only creates data views
      - SKIP_PASSWORD_SETUP=true  # Skip password setup (already done by ada_elasticsearch_setup)
    depends_on:
      ada_kibana:
        condition: service_healthy
    restart: "no"

  ada_backend:
    container_name: "ada_backend"
    image: ada_backend:2.9.1
    restart: unless-stopped
    networks:
      ada-networks:
        aliases:
          - backend
          - ada_backend
    ports:
      - "80:80"
      - "9092:9092/udp"
    volumes:
      - backend_data:/home/adadmin/logs:rw
      - report_data:/home/adadmin/download/report:rw
      - rules_data:/home/adadmin/rules:rw
    environment:
      - GIN_MODE=release
    depends_on:
      ada_elasticsearch:
        condition: service_healthy
      ada_redis:
        condition: service_healthy
      ada_mongodb:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:8801/ping || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  ada_engine:
    container_name: "ada_engine"
    image: ada_engine:2.9.1
    restart: unless-stopped
    networks:
      ada-networks:
        aliases:
          - engine
          - ada_engine
    volumes:
      - engine_data:/home/adadmin/logs:rw
      - rules_data:/home/adadmin/rules:ro
    depends_on:
      - ada_elasticsearch
      - ada_redis
      - ada_mongodb

  ada_zeek:
    container_name: "ada_zeek"
    image: ada_zeek:2.9.1
    restart: unless-stopped
    networks:
      ada-networks:
        aliases:
          - zeek
          - ada_zeek
    ports:
      - "9093:9093/udp"
    depends_on:
      - ada_elasticsearch
      - ada_redis
      - ada_backend

  ada_scanner:
    container_name: "ada_scanner"
    image: ada_scanner:2.9.1
    restart: unless-stopped
    networks:
      ada-networks:
        aliases:
          - scanner
          - ada_scanner
    volumes:
      - scanner_data:/home/adadmin/logs:rw    
    depends_on:
      - ada_mongodb
      - ada_redis
      - ada_backend

# define docker network
networks:
  ada-networks:

volumes:
  es_data:
    driver: local
  redis_data:
    driver: local
  mongodb_data:
    driver: local
  backend_data:
    driver: local
  report_data:
    driver: local
  engine_data:
    driver: local
  scanner_data:
    driver: local
  rules_data:
    driver: local

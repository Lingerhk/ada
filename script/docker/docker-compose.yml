name: "adaegis"

services:
  ada_mongodb:
    container_name: "ada_mongodb"
    image: ada_mongodb:2.9.1
    restart: unless-stopped
    networks:
      ada-networks:
        aliases:
          - mongodb
          - ada_mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME="root"
      - MONGO_INITDB_ROOT_PASSWORD="XEl44B4p3hFurztFMo38"
    volumes:
      - mongodb_data:/data/db:rw
    ports:
      - "27017:27017/tcp"

  ada_redis:
    container_name: "ada_redis"
    image: ada_redis:2.9.1
    restart: unless-stopped
    networks:
      ada-networks:
        aliases:
          - redis
          - ada_redis
    volumes:
      - redis_data:/data:rw
    ports:
      - "9091:9091/tcp"
      - "6379:6379/tcp"

  ada_elasticsearch:
    container_name: "ada_elasticsearch"
    image: ada_elasticsearch:2.9.1
    restart: unless-stopped
    networks:
      ada-networks:
        aliases:
          - elasticsearch
          - ada_elasticsearch
    volumes:
      - es_data:/bitnami/elasticsearch/data:rw
    ports:
      - "9200:9200"

  ada_kibana:
    container_name: "ada_kibana"
    image: ada_kibana:2.9.1
    restart: unless-stopped
    networks:
      ada-networks:
        aliases:
          - kibana
          - ada_kibana
    ports:
      - "5601:5601"
    depends_on:
      - ada_elasticsearch

  ada_backend:
    container_name: "ada_backend"
    image: ada_backend:2.9.1
    restart: unless-stopped
    networks:
      ada-networks:
        aliases:
          - backend
          - ada_backend
    ports:
      - "80:80"
    volumes:
      - backend_data:/home/adadmin/logs:rw
    environment:
      - GIN_MODE=release
    depends_on:
      - ada_elasticsearch
      - ada_redis
      - ada_mongodb

  ada_engine:
    container_name: "ada_engine"
    image: ada_engine:2.9.1
    restart: unless-stopped
    networks:
      ada-networks:
        aliases:
          - engine
          - ada_engine
    volumes:
      - engine_data:/home/adadmin/logs:rw
    depends_on:
      - ada_elasticsearch
      - ada_redis
      - ada_mongodb

  ada_zeek:
    container_name: "ada_zeek"
    image: ada_zeek:2.9.1
    restart: unless-stopped
    networks:
      ada-networks:
        aliases:
          - zeek
          - ada_zeek
    ports:
      - "9093:9093/udp"
    depends_on:
      - ada_elasticsearch
      - ada_redis
      - ada_backend

  ada_scanner:
    container_name: "ada_scanner"
    image: ada_scanner:2.9.1
    restart: unless-stopped
    networks:
      ada-networks:
        aliases:
          - scanner
          - ada_scanner
    depends_on:
      - ada_mongodb
      - ada_redis
      - ada_backend

# define docker network
networks:
  ada-networks:

volumes:
  es_data:
    driver: local
  redis_data:
    driver: local
  mongodb_data:
    driver: local
  backend_data:
    driver: local
  engine_data:
    driver: local

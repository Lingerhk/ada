server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name localhost;

    client_max_body_size 2048m;
    client_body_timeout 600s;
    add_header Strict-Transport-Security "max-age=31536000";

    access_log /var/log/nginx/ada_access.log;
    error_log /var/log/nginx/ada_error.log;

    location / {
        root /home/adadmin/static;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location ~ \.(js|css|png|ico|jpg|ttf|woff|woff2|svg)$ {
        root /home/adadmin/static;
        gzip on;
        gzip_buffers 4 16k;
        gzip_comp_level 6;
        gzip_vary on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /ada.ADA/ {
        grpc_pass grpc://127.0.0.1:8800;
        grpc_set_header X-Real-IP $remote_addr;
        grpc_set_header Content-Type application/grpc;

        grpc_read_timeout 300s;
        grpc_send_timeout 300s;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'authorization,content-type,x-grpc-web,x-user-agent';
            add_header 'Access-Control-Max-Age' 86400;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }
        if ($request_method = 'POST') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Expose-Headers' 'grpc-status,grpc-message';
        }
    }

    location ^~/kibana/ {
        proxy_pass http://127.0.0.1:8801;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_intercept_errors on;
    }

    location = /mcp {
        proxy_pass http://127.0.0.1:8801/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    location ^~/download/ {
        alias /home/adadmin/download/;
    }

    location = /lic/trait {
        proxy_pass http://127.0.0.1:8801/lic/trait;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /webssh/stream {
        proxy_pass http://127.0.0.1:8801/webssh/stream;
        add_header 'Access-Control-Allow-Origin' '*';
        proxy_http_version 1.1;
        proxy_read_timeout 300;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Real-PORT $remote_port;
    }

    error_page 502 503 504 = @kibana_error;
    location @kibana_error {
        default_type text/plain;
        return 503 "ES/Kibana not installed";
    }
}

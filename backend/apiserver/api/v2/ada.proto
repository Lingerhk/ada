/* protobuf generated code shouldn't be here. consider add a script or a flag in main */

// generate:
// protoc -I$GOPATH/src:. --govalidators_out=:. --go_out=plugins=grpc:. ada.proto

syntax = "proto3";

package ada;

option go_package = "./;v2";

import "github.com/mwitkow/go-proto-validators/validator.proto";

service ADA {
  // User 账户管理
  rpc Login(LoginReq) returns (LoginReply) {} //登录
  rpc Logout(LogoutReq) returns (LogoutReply) {} //登出
  rpc ListUser(ListUserReq) returns (ListUserReply) {} //用户列表
  rpc AddUser(AddUserReq) returns (AddUserReply) {} //添加用户
  rpc UpdateUser(UpdateUserReq) returns (UpdateUserReply) {} //更新用户信息
  rpc UpdateUserPassword(UpdateUserPasswordReq) returns (UpdateUserPasswordReply) {} //更新用户密码
  rpc DeleteUser(DeleteUserReq) returns (DeleteUserReply) {} //删除用户
  rpc UserExists(UserExistsReq) returns (UserExistsReply) {} //用户是否存在
  // Authority 二次验证相关接口
  rpc CheckMfa(CheckMfaReq)returns(CheckMfaReply) {}// 登陆前校验是否需要二次验证
  rpc EnableMfa(EnableMfaReq)returns(EnableMfaReply) {} // 添加二次验证
  rpc DisableMfa(DisableMfaReq)returns(DisableMfaReply) {} // 禁用二次验证
  rpc UpdateAvatar(UpdateAvatarReq)returns (UpdateAvatarReply) {}// 更新头像
  rpc ResetPassword(ResetPasswordReq)returns (ResetPasswordReply) {}// 重置用户密码
  rpc GetPwdUpdateTm(GetPwdUpdateTmReq)returns(GetPwdUpdateTmReply) {} //获取用户最后修改密码时间

  // Domain
  rpc ListDomain(ListDomainReq) returns (ListDomainReply) {}  //域列表
  rpc AddDomain(AddDomainReq) returns (AddDomainReply) {} //添加域
  rpc TestDomain(TestDomainReq) returns (TestDomainReply) {} //测试域连接
  rpc UpdateDomain(UpdateDomainReq) returns (UpdateDomainReply) {} //更新域配置
  rpc DeleteDomain(DeleteDomainReq) returns (DeleteDomainReply) {} //删除域配置
  rpc UpdateDomainData(UpdateDomainDataReq)returns (UpdateDomainDataReply) {} // 同步域数据
  rpc DeploySensor(DeploySensorReq) returns (DeploySensorReply) {} // Deploy Sensor(via winRM)

  // sensor
  rpc ListSensor(ListSensorReq) returns (ListSensorReply) {} //传感器列表
  rpc UpdateSensor(UpdateSensorReq) returns (UpdateSensorReply) {} //更新传感器配置
  rpc DownloadSensor(DownloadSensorReq)  returns (DownloadSensorReply) {}  //下载传感器
  rpc CmdSensor(CmdSensorReq) returns (CmdSensorReply) {}  //下发命令(start/stop)到传感器/删除(uninstall)
  rpc UpdateSensorVersion(UpdateSensorVersionReq) returns(UpdateSensorVersionReply) {}// 传感器版本更新

  // 系统信息
  // 1.基本信息
  rpc GetSystemInfo(GetSystemInfoReq) returns (GetSystemInfoReply) {} //获取系统信息
  rpc GetSystemIcon(GetSystemIconReq)returns(GetSystemIconReply) {}
  rpc UpdateSystemIcon(UpdateSystemIconReq)returns(UpdateSystemIconReply) {}
  rpc UpdateNtpAddress(UpdateNtpAddressReq)returns(UpdateNtpAddressReply) {}
  rpc UpdateSystemLanguage(UpdateSystemLanguageReq)returns(UpdateSystemLanguageReply) {}
  rpc UpdateSystemIP(UpdateSystemIPReq)returns(UpdateSystemIPReply) {} // 更新系统IP

  // 2.系统监控: load|cpu|mem|net_rx|net_tx
  rpc GetSystemStats(GetSystemStatsReq) returns (GetSystemStatsReply) {} //获取系统监控信息
  rpc SetSystemStatsCfg(SetSystemStatsCfgReq) returns (SetSystemStatsCfgReply) {} //设置系统监控参数, 支持的参考参考GetSystemInfoReply.statsCfg

  // 3.授权管理
  rpc GetLicense(GetLicenseReq) returns (GetLicenseReply) {} //获取许可证
  rpc UpdateLicense(UpdateLicenseReq) returns (UpdateLicenseReply) {}  //更新许可证

  // 4.调试工具
  rpc NetworkDebug(NetworkDebugReq)returns(NetworkDebugReply) {} //调试工具

  // 告警配置
  rpc ListNotifyConf(ListNotifyConfReq)returns(ListNotifyConfReply) {} // 告警配置列表页
  rpc UpdateNotifyConf(UpdateNotifyConfReq)returns(UpdateNotifyConfReply) {} // 编辑告警配置
  rpc EnableNotifyConf(EnableNotifyConfReq)returns(EnableNotifyConfReply){} // 开关通知配置
  rpc TestNotifyConf(TestNotifyConfReq)returns(TestNotifyConfReply){} // 测试告警配置

  // 导出管理
  rpc ListExportTask(ListExportTaskReq)returns(ListExportTaskReply) {} // 导出数据列表
  rpc AddExportTask(AddExportTaskReq)returns(AddExportTaskReply) {} // 添加导出任务
  rpc DeleteExportTask(DeleteExportTaskReq)returns(DeleteExportTaskReply) {} // 删除导出任务

  // 消息中心
  rpc ListNotify(ListNotifyReq)returns (ListNotifyReply) {}
  rpc UpdateNotify(UpdateNotifyReq)returns (UpdateNotifyReply) {}
  rpc StatsNotify(StatsNotifyReq)returns(StatsNotifyReply) {}

  // 日志审计
  rpc ListAuditLog(ListAuditLogReq) returns (ListAuditLogReply) {} //获取审计日志

  ////////////////////////////////
  // threat威胁检测dashboard
  rpc ThreatTops(ThreatTopsReq) returns (ThreatTopsReply) {} // 威胁事件/行为top10
  rpc ThreatTrends(ThreatTrendsReq) returns (ThreatTrendsReply) {} // 威胁行为趋势

  // threat威胁检测
  rpc ListThreat(ListThreatReq) returns (ListThreatReply) {} // 威胁事件列表
  rpc GetThreatNames(GetThreatNamesReq) returns (GetThreatNamesReply) {} // 规则名称/ruleId映射列表
  rpc ListThreatRule(ListThreatRuleReq) returns (ListThreatRuleReply) {} // 规则详情列表
  rpc ActionThreatRule(ActionThreatRuleReq) returns (ActionThreatRuleReply) {} // 规则操作: 开启状态，AutoBlock状态开关
  rpc GetThreat(GetThreatReq) returns (GetThreatReply) {} // 威胁事件详情
  rpc ActionThreat(ActionThreatReq) returns (ActionThreatReply) {} // 威胁事件操作
  rpc ListActivity(ListActivityReq) returns (ListActivityReply) {} // 威胁行为列表
  rpc GetActivityNames(GetActivityNamesReq) returns (GetActivityNamesReply) {} // 威胁行为名称/actId映射列表
  rpc GetActivity(GetActivityReq) returns (GetActivityReply) {} // 威胁行为详情
  rpc ListThreatConf(ListThreatConfReq) returns (ListThreatConfReply) {} // 威胁配置列表
  rpc UpdateThreatConf(UpdateThreatConfReq) returns (UpdateThreatConfReply) {} // 更新威胁配置
  rpc ListSensitiveEntry(ListSensitiveEntryReq) returns (ListSensitiveEntryReply) {} // 敏感条目列表
  rpc AddSensitiveEntry(AddSensitiveEntryReq) returns (AddSensitiveEntryReply) {} // 增加敏感条目
  rpc ListDomainEntry(ListDomainEntryReq) returns (ListDomainEntryReply) {} // Domain Users列表（增加敏感条目，选择)
  rpc DeleteSensitiveEntry(DeleteSensitiveEntryReq) returns (DeleteSensitiveEntryReply) {} // 删除敏感条目
  rpc ListThreatWhitelist(ListThreatWhitelistReq) returns (ListThreatWhitelistReply) {} // 规则白名单列表
  rpc GetThreatWhitelistField(GetThreatWhitelistFieldReq) returns (GetThreatWhitelistFieldReply) {} // 规则字段说明
  rpc AddThreatWhitelist(AddThreatWhitelistReq) returns (AddThreatWhitelistReply) {} // 添加规则白名单
  rpc UpdateThreatWhitelist(UpdateThreatWhitelistReq) returns (UpdateThreatWhitelistReply) {} // 更新规则白名单
  rpc DeleteThreatWhitelist(DeleteThreatWhitelistReq) returns (DeleteThreatWhitelistReply) {} // 删除规则白名单
  rpc ListThreatBlock(ListThreatBlockReq) returns (ListThreatBlockReply) {} // 威胁阻断列表
  rpc AddThreatBlock(AddThreatBlockReq) returns (AddThreatBlockReply) {} // 阻断添加
  rpc UpdateThreatBlock(UpdateThreatBlockReq) returns (UpdateThreatBlockReply) {} // 阻断更新
  rpc DeleteThreatBlock(DeleteThreatBlockReq) returns (DeleteThreatBlockReply) {} // 阻断删除

  // Rule Management (Alert Rules & Activity Rules)
  rpc ListAlertRule(ListAlertRuleReq) returns (ListAlertRuleReply) {} // 告警规则列表
  rpc AddAlertRule(AddAlertRuleReq) returns (AddAlertRuleReply) {} // 添加告警规则
  rpc UpdateAlertRule(UpdateAlertRuleReq) returns (UpdateAlertRuleReply) {} // 更新告警规则
  rpc DeleteAlertRule(DeleteAlertRuleReq) returns (DeleteAlertRuleReply) {} // 删除告警规则
  rpc GetAlertTypes(GetAlertTypesReq) returns (GetAlertTypesReply) {} // 删除告警规则
  rpc ListActivityRule(ListActivityRuleReq) returns (ListActivityRuleReply) {} // Sigma规则列表
  rpc GetActivityRule(GetActivityRuleReq) returns (GetActivityRuleReply) {} // 获取Sigma规则详情
  rpc AddActivityRule(AddActivityRuleReq) returns (AddActivityRuleReply) {} // 添加Sigma规则
  rpc UpdateActivityRule(UpdateActivityRuleReq) returns (UpdateActivityRuleReply) {} // 更新Sigma规则
  rpc DeleteActivityRule(DeleteActivityRuleReq) returns (DeleteActivityRuleReply) {} // 删除Sigma规则

  ////////////////////////////////
  // scanrisk主动检测dashboard
  rpc ScanRiskStats(ScanRiskStatsReq) returns (ScanRiskStatsReply) {} // 主动检测事件概览
  // scanrisk主动检测
  rpc ListBaseline(ListBaselineReq) returns (ListBaselineReply) {} // 基线事件列表
  rpc GetBaseline(GetBaselineReq) returns (GetBaselineReply) {} //  获取基线事件详情
  rpc ListLeak(ListLeakReq) returns (ListLeakReply) {} // 漏洞事件列表
  rpc ListWeakPwd(ListWeakPwdReq) returns (ListWeakPwdReply) {} // 漏洞事件列表

  // 任务管理
  rpc ListScanTask(ListScanTaskReq) returns (ListScanTaskReply) {} // 扫描任务列表
  rpc GetScanTask(GetScanTaskReq) returns (GetScanTaskReply) {} // 获取扫描任务详情
  rpc AddScanTask(AddScanTaskReq) returns (AddScanTaskReply) {} // 添加扫描任务
  rpc RecheckScanTask(RecheckScanTaskReq) returns (RecheckScanTaskReply) {} // 立即检测
  rpc DeleteScanTask(DeleteScanTaskReq) returns (DeleteScanTaskReply) {} // 删除扫描任务
  // 扫描配置
  rpc ListScanConf(ListScanConfReq) returns (ListScanConfReply) {} // 扫描配置列表
  rpc SetScanConf(SetScanConfReq) returns (SetScanConfReply) {} // 修改扫描配置
  rpc GetScanConf(GetScanConfReq) returns (GetScanConfReply) {} // 扫描配置详情
  rpc GetScanTmplNames(GetScanTmplNamesReq) returns (GetScanTmplNamesReply) {} // 扫描模版名称列表
  rpc UpdateScanConf(UpdateScanConfReq) returns (UpdateScanConfReply) {} // 更新配置详情
  // 扫描模板
  rpc ListScanTmpl(ListScanTmplReq) returns (ListScanTmplReply) {} // 扫描模版列表
  rpc GetScanTmpl(GetScanTmplReq) returns (GetScanTmplReply) {} // 获取扫描模版详情
  rpc UpdateScanTmpl(UpdateScanTmplReq) returns (UpdateScanTmplReply) {} // 更新扫描模版
  rpc DeleteScanTmpl(DeleteScanTmplReq) returns (DeleteScanTmplReply) {} // 删除扫描模版
  rpc AddScanTmpl(AddScanTmplReq) returns (AddScanTmplReply) {} // 添加扫描模版
  rpc ListScanPlugin(ListScanPluginReq) returns (ListScanPluginReply) {} // 获取扫描插件list

  // 安全大盘
  rpc DashboardStats(DashboardStatsReq) returns (DashboardStatsReply) {} // dashboard 统计状态
  rpc DashboardTrends(DashboardTrendsReq) returns (DashboardTrendsReply) {} // dashboard 趋势图表
  rpc DashboardLogStats(DashboardLogStatsReq) returns (DashboardLogStatsReply) {} // dashboard winlog/pktlog状态
}

// common page message struct
message ModelPage {
  int32 pageIdx = 1 ;// start index with 1
  int32 pageSize = 2; // if pageSize is -1, we will return all nodes
  int32 total = 3; // the total number of records
}

message LoginReq {
  string username = 1;
  string password = 2;
  string totpCode = 3 [(validator.field) = {regex: "d{6}|^(\\s&&[^\\f\\n\\r\\t\\v])*"}];
}

message LoginReply {
  int32 ID = 1;
  string username = 2;
  string passStrength = 3; // 密码强度: high/middle/low
  string role = 4;
  int32 priv = 5;
  string mobile = 6;
  string email = 7;
  string remark = 8;
  string token = 9;
  bool  hasMfa = 10; // 是否需要二次验证
  bool needChangePwd = 11; // 是否需要修改密码
}

message LogoutReq {
  string username = 1;
}

message LogoutReply {
  string result = 1;
}


message ListUserReq {
  // start index with 1.
  int32 pageIdx = 1 [(validator.field) = {int_gt: 0}];
  // if pageSize is -1, we will return all pods.
  int32 pageSize = 2;
  // the fuzzying matching pairs for this query.
  string search = 3;
  //
  bool  isSelf = 4; // 查询个人信息true，查询子用户列表false
  repeated string filterRole = 5;  // 角色
  repeated string filterMfaStatus = 6; // 二次认证状态 开启enable|禁用disable|关闭stop
  repeated string filterPassStrength = 7; // 密码强度 high/middle/low
  string filterStartCreateTm = 8; // 创建开始时间
  string filterEndCreateTm = 9; // 创建结束时间
  string filterStartPassTm = 10; // 密码最后修改开始时间
  string filterEndPassTm = 11; // 密码最后修改结束时间
  int32 sort = 12; // 创建时间排序，1为升序，-1为降序| 密码修改时间 2为升序，-2为降序
}

message ListUserReply {
  ModelPage page = 1;
  message Details {
    int32 ID = 1;
    string username = 2;
    string passStrength = 3; // 密码强度: high/middle/low
    string role = 4; // 用户角色: mgr 超级管理员|dev 开发|ops 运维|sec 安全
    int32 priv = 5; // 权限类别: 1:super 2:admin 3:guest
    string mobile = 6 ;
    string email = 7 ;
    string remark = 8;
    string createTm = 9;
    bool  hasMfa = 10; // 是否开启二次验证
    string avatar = 11; // 头像
    string pwdUpdateTm = 12; // 密码更新时间
    string address = 13; // 所在地
    string realName = 14; // 真实姓名
    string department = 15; // 部门
    string post = 16; // 岗位
  }
  repeated Details List = 2;
  bool exhausted = 3; // if this is last page
}

message AddUserReq {
  string username = 1;
  string password = 2;
  string role = 3;
  string mobile = 4 [(validator.field) = {regex: "^1[3|4|5|6|7|8|9][0-9]\\d{8}$|^(\\s&&[^\\f\\n\\r\\t\\v])*"}];
  string email = 5 [(validator.field) = {regex: "\\w+([-+.]\\w+)*@\\w+([-.]\\w+)*\\.\\w+([-.]\\w+)*|^(\\s&&[^\\f\\n\\r\\t\\v])*"}];
  string remark = 6;
  string address = 7; // 所在地
  string realName = 8; // 真实姓名
  string department = 9; // 部门
  string post = 10; // 岗位
}

message AddUserReply {
  string result = 1;
}

message UpdateUserReq {
  string username = 1;
  string mobile = 2 [(validator.field) = {regex: "^1[3|4|5|6|7|8|9][0-9]\\d{8}$|^(\\s&&[^\\f\\n\\r\\t\\v])*"}];
  string email = 3 [(validator.field) = {regex: "\\w+([-+.]\\w+)*@\\w+([-.]\\w+)*\\.\\w+([-.]\\w+)*|^(\\s&&[^\\f\\n\\r\\t\\v])*"}];
  string remark = 4;
  string role = 5; // 可选，super用户可以修改任意username的role
  string address = 6; // 所在地
  string realName = 7; // 真实姓名
  string department = 8; // 部门
  string post = 9; // 岗位
}

message UpdateUserReply {
  string result = 1;
}

message UpdateUserPasswordReq {
  string oldPassword = 1;
  string newPassword = 2;
  string username = 3; // 可选，super用户可以修改任意username的密码
}

message UpdateUserPasswordReply {
  string result = 1;
}

message DeleteUserReq {
  string username = 1;
}

message DeleteUserReply {
  string result = 1;
}

message UserExistsReq {
  string username = 1;
}
message UserExistsReply {
  bool result = 1;
}


message CheckMfaReq {
  string username = 1;
  string password = 2;
}

message CheckMfaReply {
  bool hasMfa = 1;
}

message EnableMfaReq {
  string username = 1;
  string password = 2;
  string secret = 3;
  string mfaCode = 4 [(validator.field) = {length_eq: 6}];
}

message EnableMfaReply {
  string result = 1; // SUCCESS || FAILED
}

message DisableMfaReq {
  string username = 1;
}

message DisableMfaReply {
  string result = 1; // SUCCESS || FAILED
}

message UpdateAvatarReq {
  int32 userId = 1;
  string file = 2;
}

message UpdateAvatarReply {
  string result = 1; //  success failed
}

message ResetPasswordReq {
  string username = 1;
  string newPassword = 2 [(validator.field) = {length_gt: 11}];
}

message ResetPasswordReply {
  string result = 2;
}

message GetPwdUpdateTmReq{
  string userName = 1;
}
message GetPwdUpdateTmReply{
  bool needChangePwd = 1;
  string pwdUpdateTm = 2;
}

// Domain
message ListDomainReq {
  int32 pageIdx = 1 [(validator.field) = {int_gt: 0}];
  // if pageSize is -1, we will return all pods.
  int32 pageSize = 2;
  string filterDomain = 3; // 根据所在域筛选
  string filterStatus = 4; // 根据域状态筛选
  string filterKeyword = 5; // 根据关键词搜索
}

message ListDomainReply {
  ModelPage page = 1;
  message dcList {
    string hostname = 1;
    string platform = 2;
    string version = 3;
    string ips = 4;
    string timeout = 5;
    string status = 6;
    bool hasSensor = 7;
    bool isMaster = 8;
    string fsmoRole = 9;
    string errMsg = 10;
    string lastOnlineTm = 11;
  }
  message Details {
    string ID = 1;
    string name = 2;
    string dcHostname = 3;
    string status = 4;
    map <string, string> domainInfo = 5;
    string createTm = 6;
    string errMsg = 7;
    repeated dcList DCs = 8;
  }
  repeated Details List = 2;
  bool exhausted = 3; // if this is last page
}

message AddDomainReq {
  string ldapAddr = 1;
  string username = 2;
  string password = 3;
  string DNS = 4 [(validator.field) = {regex: "^((0|[1-9]\\d?|1\\d\\d|2[0-4]\\d|25[0-5])\\.){3}(0|[1-9]\\d?|1\\d\\d|2[0-4]\\d|25[0-5])$|^(\\s&&[^\\f\\n\\r\\t\\v])*"}]; //可选
}
message AddDomainReply {
  string result = 1;
}

message TestDomainReq {
  string ldapAddr = 1;
  string username = 2;
  string password = 3;
  string DNS = 4 [(validator.field) = {regex: "^((0|[1-9]\\d?|1\\d\\d|2[0-4]\\d|25[0-5])\\.){3}(0|[1-9]\\d?|1\\d\\d|2[0-4]\\d|25[0-5])$|^(\\s&&[^\\f\\n\\r\\t\\v])*"}]; //可选
}
message TestDomainReply {
  int32 status = 1; // 1为成功，0为失败，
  string msg = 2; // 错误信息
}

message UpdateDomainReq {
  string ID = 1;
  string ldapAddr = 2;
  string username = 3;
  string password = 4;
  string DNS = 5 [(validator.field) = {regex: "^((0|[1-9]\\d?|1\\d\\d|2[0-4]\\d|25[0-5])\\.){3}(0|[1-9]\\d?|1\\d\\d|2[0-4]\\d|25[0-5])$|^(\\s&&[^\\f\\n\\r\\t\\v])*"}]; //可选
}
message UpdateDomainReply {
  string result = 1;
}

message DeleteDomainReq {
  string ID = 1;
  string Name = 2;
}

message DeleteDomainReply {
  string result = 1;
}

message UpdateDomainDataReq {
  string domainID = 1;// 域的ID
}

message UpdateDomainDataReply {
  string result = 1;//  success failed
}

message DeploySensorReq {
  string domainID = 1; // 域的ID
  string dcHostname = 2; // DC Hostname 
}

message DeploySensorReply {
  string result = 1; //  success | failed
}

message ListSensorReq {
  int32 pageIdx = 1 [(validator.field) = {int_gt: 0}];
  int32 pageSize = 2;
  repeated string domain = 3; // filter: domain
  repeated string status = 4; // filter: Init|Running|Stopped
  string keyword = 5; // for search
  int32 tmSort = 6; // 最后在线时间排序，1为升序，-1为降序
}

message ListSensorReply {
  message mapSlice {
    map<string, string> event = 1;
  }

  ModelPage page = 1;
  message Details {
    string ID = 1;
    string IP = 2 ;
    string hostname = 3;
    string domain = 4 ;
    string status = 5; // 运行状态
    string version = 6;
    string newVersion = 7; // 可更新的sensor版本
    string pktStatus = 8; // 流量采集状态 Init|Running|Stopped|Error
    string logStatus = 9; // 日志采集状态 Init|Running|Stopped|Error
    string sensorTime = 10; // 宿主机的当前时间戳(用作时间校正)
    string remark = 11;    // 备注

    string pktPluginSwitch = 12;   // 流量插件开关: true|false
    string logPluginSwitch = 13;    // 日志插件开关: true|false
    string rpcFwPluginSwitch = 14;   // rpcfw插件开关: true|false
    string ldapFwPluginSwitch = 15;  // ldapfw插件开关: true|false
    string pktPluginStatus = 16;     // 流量插件状态 Init|Running|Stopped|Error
    string logPluginStatus = 17;     // 日志插件状态 Init|Running|Stopped|Error
    string rpcFwPluginStatus = 18;   // rpcfw插件状态 Init|Running|Stopped|Error
    string ldapFwPluginStatus = 19;  // ldapfw插件状态 Init|Running|Stopped|Error
    string rpcFWCpuUsed = 20;
    string rpcFWMemUsed = 21;
    string ldapFwCpuUsed = 22;
    string ldapFwMemUsed = 23;
    string sensorCpuUsed = 24;
    string sensorMemUsed = 25;

    string platform = 26; // DC 平台
    string kernelVer = 27; // DC内核版本
    string memTotal = 28; // 内存大小(DC)
    string cpuTotal  = 29; // CPU核数
    map<string, string> netIface = 30; // 主机上网口列表 {"eth0":"ip1,ip2"}
    repeated string bindNetIface = 31; // 绑定的接口list： ["eth0", "eth1"]
    int32 dcIntervalTm = 32; // 域控时间与服务器时间的差值(秒)

    map<string, string> perfLimit = 33; // // 资源占用限制
    repeated mapSlice events = 34; //  运行日志

    string createTm = 35; // 添加时间
    string lastOnlineTm = 36; // 最后在线时间
    string LastCollectTm = 37;// 最后采集时间
  }
  repeated Details List = 2;
  bool exhausted = 3; // if this is last page
}

message UpdateSensorReq {
  string ID = 1;
  repeated string bindNetIface = 2; // 如果没有变化 带原值
  map<string, string> perfLimit = 3; // 如果没有变化 带原值, {"limit_mem_max":"0.05", "limit_cpu_max":"0.06"}
  string remark = 4;// 如果没有变化 带原值
  string pktPluginSwitch = 5 [(validator.field) = {regex: "true|false"}]; // 如果没有变化留空
  string logPluginSwitch = 6 [(validator.field) = {regex: "true|false"}];  // 如果没有变化留空
  string rpcFwPluginSwitch = 7 [(validator.field) = {regex: "true|false"}];  // 如果没有变化留空
  string ldapFwPluginSwitch = 8 [(validator.field) = {regex: "true|false"}];  // 如果没有变化留空
}

message UpdateSensorReply {
  string result = 1;
}

message DownloadSensorReq {
  string Type = 1 [(validator.field) = {regex: "x64|x86"}]; // x64 x86
}

